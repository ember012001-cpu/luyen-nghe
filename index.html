function updateTopbar2(item){
  const tb=$('#topbar2nd'); if(!tb) return;
  tb.classList.add('show');
  document.body.classList.add('has-tb2');
  // breadcrumb
  const path=pathOf(item.id);
  const cb=$('#tb2Crumb'); if(cb) cb.innerHTML=path.slice(0,-1).map(p=>`<span style="opacity:.6">${esc(p)}</span>`).join(' <span style="opacity:.4">›</span> ')+(path.length>1?' <span style="opacity:.4">›</span> ':'')+'<b>'+esc(path[path.length-1])+'</b>';
  // nav arrows
  const flat=flatItems(); const i=flat.indexOf(item.id);
  const prev=$('#tb2Prev'),next=$('#tb2Next');
  if(prev){prev.disabled=!(i>0); prev.onclick=()=>navToItem(-1);}
  if(next){next.disabled=!(i>=0&&i<flat.length-1); next.onclick=()=>navToItem(1);}
  // font selector
  const fsel=$('#tb2Font');
  if(fsel){
    const fontMap={
      'kaiti':"'KaiTi','楷体',serif",
      'quicksand':"'Quicksand',sans-serif",
      'simsun':"'SimSun','宋体',serif",
      'yahei':"'YaHei','微软雅黑',sans-serif"
    };
    fsel.value=item._fontKey||'kaiti';
    fsel.onchange=()=>{
      const ed=$('#transcriptEditor');
      if(ed){ed.style.fontFamily=fontMap[fsel.value]||fontMap.kaiti; item._fontKey=fsel.value; saveMeta();}
    };
  }
  // size buttons
  const szDn=$('#tb2SzDn'), szUp=$('#tb2SzUp');
  function tweakSize(d){ const ed=$('#transcriptEditor'); if(!ed) return;
    const s=Math.max(13,Math.min(36,(parseFloat(ed.style.fontSize)||21)+d));
    ed.style.fontSize=s+'px'; item.tsizePx=s; saveMeta(); }
  if(szDn) szDn.onclick=()=>tweakSize(-1);
  if(szUp) szUp.onclick=()=>tweakSize(1);
  // format buttons
  const cmds=[['tb2Bold','bold'],['tb2Italic','italic'],['tb2Und','underline']];
  cmds.forEach(([id,cmd])=>{ const b=$('#'+id); if(b) b.onclick=()=>{ document.execCommand(cmd); }; });
  // pip title
  const pt=$('#pipTitle'); if(pt) pt.textContent=item.title||'Video';
}

/* ============================================================
   🎞️ VIDEO RESIZE (kéo để to/nhỏ)
   ============================================================ */
function wireVideoResize(){
  const handle=$('#ytResizeHandle'), wrap=$('#ytWrap');
  if(!handle||!wrap) return;
  function initDrag(startY, startH){
    function onMove(e){
      const clientY=e.touches?e.touches[0].clientY:e.clientY;
      const newH=Math.max(140,Math.min(700,startH+(clientY-startY)));
      wrap.style.paddingTop='0'; wrap.style.height=newH+'px';
    }
    function onEnd(){ document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onEnd);
      document.removeEventListener('touchmove',onMove); document.removeEventListener('touchend',onEnd); }
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onEnd);
    document.addEventListener('touchmove',onMove,{passive:true});
    document.addEventListener('touchend',onEnd);
  }
  handle.addEventListener('mousedown',e=>{ e.preventDefault();
    const h=wrap.getBoundingClientRect().height; initDrag(e.clientY,h); });
  handle.addEventListener('touchstart',e=>{ const t=e.touches[0];
    const h=wrap.getBoundingClientRect().height; initDrag(t.clientY,h); },{passive:true});
}

/* ============================================================
   📺 PiP MINI-PLAYER
   ============================================================ */
let _pipObserver=null, _pipShowing=false;
function setupPipSentinel(){
  if(_pipObserver){_pipObserver.disconnect();_pipObserver=null;}
  hidePip();
  // Theo dõi card player: khi nó ra khỏi viewport thì show PiP
  const playerCard=document.querySelector('.card.player'); if(!playerCard) return;
  _pipObserver=new IntersectionObserver(entries=>{
    const visible=entries[0].isIntersecting;
    const item=currentItemId?findItem(currentItemId):null;
    if(!visible&&item&&item.audio&&item.audio.mode==='youtube') showPip(item);
    else hidePip();
  },{threshold:0,rootMargin:'-20px 0px 0px 0px'});
  _pipObserver.observe(playerCard);
}
function showPip(item){
  if(_pipShowing) return; _pipShowing=true;
  const pf=$('#pipFloat'), pc=$('#pipContent'); if(!pf||!pc) return;
  const videoId=item.audio.videoId;
  const originParam = location.protocol!=='file:' ? `&origin=${encodeURIComponent(location.origin)}` : '';
  pc.innerHTML=`<div class="pip-yt-wrap">
    <iframe src="https://www.youtube.com/embed/${esc(videoId)}?rel=0&playsinline=1&autoplay=1${originParam}"
      allowfullscreen allow="autoplay; encrypted-media"></iframe></div>`;
  pf.classList.add('show');
}
function hidePip(){
  _pipShowing=false;
  const pf=$('#pipFloat'); if(pf) pf.classList.remove('show');
  const pc=$('#pipContent'); if(pc) pc.innerHTML='';
}
function initPipControls(){
  $('#pipClose')&&($('#pipClose').onclick=()=>{ hidePip(); if(_pipObserver){_pipObserver.disconnect();_pipObserver=null;} });
  $('#pipJump')&&($('#pipJump').onclick=()=>{ hidePip(); window.scrollTo({top:0,behavior:'smooth'}); });
}

/* ============================================================
   🚀 KHỞI ĐỘNG & GẮN SỰ KIỆN
   ============================================================ */
/* ============================================================
   拼音  Pinyin trên từng chữ (pinyin-pro, load động khi cần)
   ============================================================ */
function loadPinyinPro(cb){
  if(typeof pinyinPro!=='undefined'){cb();return;}
  const s=document.createElement('script');
  s.src='https://unpkg.com/pinyin-pro@3.24.2/dist/index.js';
  s.onload=cb;
  s.onerror=()=>toast('❌ Không tải được thư viện pinyin — kiểm tra kết nối mạng rồi thử lại.');
  document.head.appendChild(s);
}
function annotatePinyin(root){
  if(typeof pinyinPro==='undefined'||!root) return;
  const {pinyin}=pinyinPro;
  const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode(n){
    if(!n.nodeValue||!/[\u4e00-\u9fff]/.test(n.nodeValue)) return NodeFilter.FILTER_SKIP;
    const p=n.parentElement;
    return(p&&p.closest&&p.closest('script,style,rt'))?NodeFilter.FILTER_REJECT:NodeFilter.FILTER_ACCEPT;
  }});
  const nodes=[];let n;while(n=walker.nextNode())nodes.push(n);
  nodes.forEach(node=>{
    try{
      const text=node.nodeValue;
      const pyArr=pinyin(text,{type:'array',toneType:'symbol'});
      const frag=document.createDocumentFragment();
      let ci=0;
      for(let i=0;i<text.length;i++){
        const ch=text[i];
        if(/[\u4e00-\u9fff]/.test(ch)){
          const py=pyArr[ci++]||'';
          const wrap=document.createElement('span'); wrap.className='py-result-item';
          const ruby=document.createElement('ruby');
          const cspan=document.createElement('span'); cspan.className='py-chinese-item'; cspan.textContent=ch;
          const rt=document.createElement('rt'); rt.className='py-pinyin-item'; rt.textContent=py;
          ruby.appendChild(cspan); ruby.appendChild(rt); wrap.appendChild(ruby); frag.appendChild(wrap);
        }else{frag.appendChild(document.createTextNode(ch));ci++;}
      }
      node.parentNode.replaceChild(frag,node);
    }catch(e){}
  });
}
function stripPinyinHTML(html){
  if(!html||html.indexOf('py-result-item')<0) return html;
  const tmp=document.createElement('div'); tmp.innerHTML=html;
  tmp.querySelectorAll('.py-result-item').forEach(item=>{
    const ch=item.querySelector('.py-chinese-item');
    item.replaceWith(document.createTextNode(ch?ch.textContent:item.textContent));
  });
  return tmp.innerHTML;
}
function applyPinyinBtn(){
  const on=!!state.settings.pinyin;
  const b=document.getElementById('pinyinToggle'); if(!b) return;
  b.classList.toggle('on',on);
  b.title=on?'Đang hiện pinyin — bấm để ẩn':'Bấm để hiện pinyin trên từng chữ Hán trong transcript';
  // Tăng line-height cho transcriptEditor khi bật pinyin
  const te=document.getElementById('transcriptEditor'); if(!te) return;
  te.classList.toggle('pinyon-on',on);
}
document.getElementById('pinyinToggle').onclick=()=>{
  if(!state.settings.pinyin){
    // Bật: load thư viện rồi mới render
    loadPinyinPro(()=>{
      state.settings.pinyin=true;
      applyPinyinBtn();
      const te=document.getElementById('transcriptEditor'); if(te) annotatePinyin(te);
      saveMeta();
    });
  }else{
    // Tắt: re-render transcript từ dữ liệu gốc (sạch)
    state.settings.pinyin=false;
    applyPinyinBtn();
    const it=findItem(currentItemId);
    const te=document.getElementById('transcriptEditor');
    if(it&&te){ te.innerHTML=it.transcriptHtml||''; applyVocabHighlights(te); }
    saveMeta();
  }
};

/* ============================================================
   简 ⇄ 繁  Giản thể ⇄ Phồn thể (opencc-js)
   ============================================================ */
let occS2T=null, occT2S=null;
function occReady(){
  if(typeof OpenCC==='undefined') return false;
  if(!occS2T){ occS2T=OpenCC.Converter({from:'cn',to:'tw'}); occT2S=OpenCC.Converter({from:'tw',to:'cn'}); }
  return true;
}
function occConv(){ return occReady()?(state.settings.script==='tw'?occS2T:occT2S):null; }

const scriptObserver=new MutationObserver(muts=>{
  if(state.settings.script!=='tw') return;
  const roots=new Set();
  muts.forEach(m=>{
    if(m.type==='characterData') roots.add(m.target);
    else if(m.type==='childList') m.addedNodes.forEach(nd=>{if(nd.nodeType===1||nd.nodeType===3)roots.add(nd);});
  });
  roots.forEach(r=>{ if(document.body.contains(r)) convertTextIn(r); });
});

function convertTextIn(root){
  const conv=occConv(); if(!conv||!root) return;
  scriptObserver.disconnect();
  try{
    if(root.nodeType===3){
      const v=conv(root.nodeValue); if(v!==root.nodeValue) root.nodeValue=v;
    } else if(root.nodeType===1){
      const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode(n){
        const p=n.parentElement;
        return(p&&p.closest&&p.closest('script,style'))?NodeFilter.FILTER_REJECT:NodeFilter.FILTER_ACCEPT;
      }});
      const nodes=[]; let n; while(n=walker.nextNode()) nodes.push(n);
      nodes.forEach(node=>{ try{ const v=conv(node.nodeValue); if(v!==node.nodeValue) node.nodeValue=v; }catch(e){} });
    }
  }catch(e){}
  scriptObserver.observe(document.body,{childList:true,subtree:true,characterData:true});
}

function applyScriptBtn(){
  const tw=state.settings.script==='tw';
  const b=document.getElementById('scriptToggle'); if(!b) return;
  b.classList.toggle('on',tw);
  b.textContent=tw?'繁 → 简':'简 → 繁';
  b.title=tw?'Đang hiển thị Phồn thể — bấm để chuyển về Giản thể':'Đang hiển thị Giản thể — bấm để chuyển sang Phồn thể';
}

document.getElementById('scriptToggle').onclick=()=>{
  if(!occReady()){
    toast('Bộ chuyển đổi chữ Hán chưa tải xong — kiểm tra kết nối mạng rồi thử lại.');
    return;
  }
  state.settings.script = state.settings.script==='tw' ? 'cn' : 'tw';
  convertTextIn(document.body);
  applyScriptBtn();
  saveMeta();
};

async function init(){
  await openDB();
  await loadMeta();
  wireFmtbar();                 // thanh định dạng dùng chung (1 lần)
  // Giản/Phồn: áp dụng trạng thái đã lưu
  if(!state.settings.script) state.settings.script='cn';
  applyScriptBtn();
  if(state.settings.script==='tw') convertTextIn(document.body);
  scriptObserver.observe(document.body,{childList:true,subtree:true,characterData:true});
  applyPinyinBtn();
  if(state.settings.pinyin) loadPinyinPro(()=>{
    const te=document.getElementById('transcriptEditor'); if(te) annotatePinyin(te);
  });
  renderTree(); renderVocab(); renderMain();

  $('#btnLeft').onclick =()=>openDrawer('left');
  $('#btnRight').onclick=()=>{ openDrawer('right'); renderVocab($('#vocabSearch').value); renderNotes(); };
  $('#closeLeft').onclick =()=>closeDrawer('left');
  $('#closeRight').onclick=()=>closeDrawer('right');
  $('#scrimLeft').onclick =()=>closeDrawer('left');
  $('#scrimRight').onclick=()=>closeDrawer('right');
  $('#btnSettings').onclick=openSettings;

  // tab Thẻ từ / Ghi chú trong ngăn phải
  $$('.rtabs .pill').forEach(b=>b.onclick=()=>{ switchRTab(b.dataset.rtab);
    if(b.dataset.rtab==='notes') renderNotes(); else renderVocab($('#vocabSearch').value); });

  $('#addRoot').onclick=()=>openPrompt('Tên thư mục gốc mới','',v=>{ if(!v.trim())return;
    state.roots.push({id:uid(),type:'folder',name:v.trim(),children:[]}); renderTree(); saveMeta(); });
  $('#expandAll').onclick=()=>{ walk(state.roots,n=>{if(n.type==='folder')expanded.add(n.id);}); renderTree(); };
  $('#collapseAll').onclick=()=>{ expanded.clear(); renderTree(); };

  $('#addVocabBtn').onclick=()=>openVocabForm({});
  $('#vocabSearch').addEventListener('input',e=>renderVocab(e.target.value));

  $('#search').addEventListener('input',e=>doSearch(e.target.value));
  $('#search').addEventListener('focus',e=>{ if(e.target.value)doSearch(e.target.value); });
  document.addEventListener('click',e=>{ if(!e.target.closest('.search-wrap')) $('#searchResults').classList.remove('open'); });

  // Esc đóng mọi thứ
  document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeDrawer('left'); closeDrawer('right');
    closeModal(); $('#searchResults').classList.remove('open'); $('#selpop').classList.remove('show'); hideFmtbar(); } });

  // mở sẵn các thư mục gốc cho dễ nhìn
  state.roots.forEach(r=>expanded.add(r.id)); renderTree();

  // PiP controls
  initPipControls();
}
init();
</script>
