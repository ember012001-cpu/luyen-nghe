<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  TĨNH NGHE · App luyện NGHE hiểu tiếng Trung (HSK + nguồn ngoài) ║
  ║  Một file HTML chạy độc lập – HTML + CSS + JS thuần.            ║
  ║  Lưu metadata vào IndexedDB (mirror localStorage), audio = Blob ║
  ║  trong IndexedDB. Có File System Access API để gắn 1 file JSON. ║
  ╚══════════════════════════════════════════════════════════════╝
-->
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tĩnh Nghe · Luyện nghe tiếng Trung</title>

<!-- Font Latin: Quicksand (cần internet lần đầu để tải, sau đó trình duyệt cache).
     Chữ Hán dùng font hệ thống Kaiti (楷体) nên không cần tải. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ============================================================
   1. BIẾN MÀU & NỀN TẢNG  (tông giấy ấm – xanh lá – vàng – cam)
   ============================================================ */
:root{
  --green-soft:#E2F0BD;   /* xanh lá nhạt   */
  --green:#8DB654;        /* xanh lá chính  */
  --green-deep:#6f9740;
  --yellow:#FBE577;       /* vàng           */
  --amber:#FFBA18;        /* vàng cam (nhấn)*/
  --orange:#DB5B23;       /* cam đất (cảnh báo / xoá) */

  --paper:#F7F3E8;        /* nền giấy ấm    */
  --paper-2:#FCFAF2;      /* mặt thẻ sáng   */
  --paper-3:#EFE9D8;      /* viền/đường kẻ  */
  --ink:#33302A;          /* chữ chính      */
  --ink-soft:#6f6a5e;     /* chữ phụ        */
  --ink-faint:#a59e8c;

  --hl-yellow:#FFF1A8;
  --hl-green:#D6EFAE;
  --hl-pink:#FAD4C4;
  --hl-blue:#CFE6F2;

  --radius:16px;
  --radius-sm:10px;
  --shadow:0 8px 30px rgba(80,70,40,.10);
  --shadow-soft:0 2px 10px rgba(80,70,40,.07);

  --han:"Kaiti SC","STKaiti","KaiTi","Kaiti TC","Kaiti","BiauKai","DFKai-SB",serif;
  --latin:"Quicksand",ui-rounded,"Segoe UI",system-ui,sans-serif;

  --transcript-size:21px;
  --transcript-lh:2.0;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:var(--latin);
  color:var(--ink);
  background:
    radial-gradient(1200px 600px at 80% -10%, #FBF6E6 0%, transparent 60%),
    radial-gradient(900px 500px at -10% 110%, #EFF4DC 0%, transparent 55%),
    var(--paper);
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
}
.han{font-family:var(--han)}
button{font-family:inherit}
::selection{background:var(--amber);color:#3a2c10}

/* ============================================================
   2. THANH TRÊN CÙNG (topbar)
   ============================================================ */
.topbar{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;gap:12px;
  padding:10px 16px;
  background:rgba(247,243,232,.82);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--paper-3);
}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.2px;white-space:nowrap}
.sun{width:30px;height:30px;border-radius:50%;flex:0 0 auto;
  background:radial-gradient(circle at 50% 50%,var(--amber) 0 38%,var(--yellow) 39% 62%,rgba(251,229,119,.4) 63% 100%);
  box-shadow:0 0 0 4px rgba(251,229,119,.35)}
.brand b{font-size:18px}
.brand small{color:var(--ink-soft);font-weight:500;font-size:11px;display:block;margin-top:-3px}

.iconbtn{
  border:1px solid var(--paper-3);background:var(--paper-2);
  width:40px;height:40px;border-radius:12px;cursor:pointer;
  font-size:18px;display:grid;place-items:center;color:var(--ink);
  transition:.15s; flex:0 0 auto;
}
.iconbtn:hover{background:var(--green-soft);border-color:var(--green)}
.iconbtn:active{transform:scale(.95)}
#scriptToggle:hover{background:var(--green-soft)!important;border-color:var(--green)!important}
#scriptToggle.on{background:var(--green)!important;color:#fff!important;border-color:var(--green)!important}
#pinyinToggle:hover{background:var(--green-soft)!important;border-color:var(--green)!important}
#pinyinToggle.on{background:var(--green)!important;color:#fff!important;border-color:var(--green)!important}
/* --- Pinyin ruby --- */
.editor.han ruby{ruby-position:over;ruby-align:center}
.editor.han rt.py-pinyin-item{font-family:var(--latin);font-size:.40em;font-weight:600;color:var(--green);user-select:none;letter-spacing:0}
.editor.han .py-result-item{display:inline}
.editor.han.pinyon-on{line-height:2.9!important}

.search-wrap{position:relative;flex:1;max-width:560px;margin:0 auto}
.search-wrap input{
  width:100%;height:40px;border-radius:12px;border:1px solid var(--paper-3);
  background:var(--paper-2);padding:0 14px 0 38px;font-size:14px;font-family:inherit;color:var(--ink);
}
.search-wrap input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(141,182,84,.18)}
.search-wrap::before{content:"🔍";position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.6;font-size:14px}
.search-results{
  position:absolute;top:46px;left:0;right:0;background:var(--paper-2);
  border:1px solid var(--paper-3);border-radius:12px;box-shadow:var(--shadow);
  max-height:60vh;overflow:auto;z-index:60;display:none;padding:6px;
}
.search-results.open{display:block}
.sr-item{padding:9px 11px;border-radius:9px;cursor:pointer;font-size:13.5px}
.sr-item:hover{background:var(--green-soft)}
.sr-item .tag{font-size:10px;background:var(--green);color:#fff;border-radius:6px;padding:1px 6px;margin-right:7px}
.sr-item .tag.v{background:var(--amber);color:#3a2c10}
.sr-item .path{color:var(--ink-faint);font-size:11px}
.sr-empty{padding:14px;color:var(--ink-faint);font-size:13px;text-align:center}

.spacer{flex:1}

/* ============================================================
   3. DRAWER (ngăn kéo trái = thư viện, phải = thẻ từ)
   ============================================================ */
.scrim{position:fixed;inset:0;background:rgba(40,36,28,.34);z-index:50;opacity:0;pointer-events:none;transition:.2s}
.scrim.show{opacity:1;pointer-events:auto}

.drawer{
  position:fixed;top:0;bottom:0;width:min(420px,92vw);z-index:55;
  background:var(--paper-2);box-shadow:var(--shadow);
  display:flex;flex-direction:column;transition:transform .24s ease;
}
.drawer.left{left:0;transform:translateX(-104%);border-right:1px solid var(--paper-3)}
.drawer.right{right:0;width:min(480px,96vw);transform:translateX(104%);border-left:1px solid var(--paper-3)}
.drawer.left.open,.drawer.right.open{transform:translateX(0)}
.drawer-head{
  display:flex;align-items:center;gap:8px;padding:14px 14px;border-bottom:1px solid var(--paper-3);
}
.drawer-head h3{margin:0;font-size:15px;flex:1}
.drawer-body{flex:1;overflow:auto;padding:10px}

/* --- Cây thư viện --- */
.tree-toolbar{display:flex;gap:6px;flex-wrap:wrap;padding:0 4px 10px}
.minibtn{border:1px solid var(--paper-3);background:var(--paper);border-radius:8px;
  padding:6px 10px;font-size:12px;cursor:pointer;color:var(--ink);transition:.15s}
.minibtn:hover{background:var(--green-soft);border-color:var(--green)}
.minibtn.primary{background:var(--green);color:#fff;border-color:var(--green)}
.minibtn.primary:hover{background:var(--green-deep)}
.minibtn.danger:hover{background:#fae0d6;border-color:var(--orange);color:var(--orange)}

.node{user-select:none}
.node-row{display:flex;align-items:center;gap:4px;padding:5px 6px;border-radius:9px;cursor:pointer;position:relative}
.node-row:hover{background:var(--green-soft)}
.node-row.dragover{outline:2px dashed var(--green);outline-offset:-2px;background:rgba(141,182,84,.12)}
.node-row.active{background:var(--amber);color:#3a2c10}
.node-row.active .node-meta{color:#6a521a}
.twisty{width:18px;text-align:center;font-size:11px;color:var(--ink-soft);flex:0 0 auto}
.node-ic{flex:0 0 auto}
.node-name{flex:1;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-meta{font-size:10px;color:var(--ink-faint)}
.node-act{opacity:0;display:flex;gap:2px}
.node-row:hover .node-act{opacity:1}
.node-act button{border:none;background:transparent;cursor:pointer;font-size:12px;border-radius:6px;padding:2px 4px;color:var(--ink-soft)}
.node-act button:hover{background:rgba(0,0,0,.07)}
.children{margin-left:14px;border-left:1px dashed var(--paper-3);padding-left:4px}

/* ============================================================
   4. KHU VỰC CHÍNH
   ============================================================ */
.main{max-width:1080px;margin:0 auto;padding:24px 22px 120px}
.empty{
  margin-top:8vh;text-align:center;color:var(--ink-soft);
}
.empty .big{font-size:64px}
.empty h2{font-weight:600;color:var(--ink)}
.empty p{max-width:520px;margin:8px auto;line-height:1.7}

.item-title{font-size:30px;font-weight:600;margin:0 0 4px}
.crumbs{color:var(--ink-faint);font-size:13px;margin-bottom:18px}

.card{
  background:var(--paper-2);border:1px solid var(--paper-3);
  border-radius:var(--radius);box-shadow:var(--shadow-soft);
  padding:16px 18px;margin-bottom:16px;
}
.card > .card-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.card-head h3{margin:0;font-size:15px;flex:1}
.pill{font-size:12px;border:1px solid var(--paper-3);background:var(--paper);
  border-radius:999px;padding:5px 12px;cursor:pointer;color:var(--ink);transition:.15s}
.pill:hover{background:var(--green-soft);border-color:var(--green)}
.pill.on{background:var(--green);color:#fff;border-color:var(--green)}

/* ============================================================
   5. TRÌNH PHÁT ÂM THANH
   ============================================================ */
.player{position:sticky;top:60px;z-index:30}
body.has-tb2 .player{top:106px}
.player .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pbtn{border:1px solid var(--paper-3);background:var(--paper);border-radius:12px;
  min-width:42px;height:42px;padding:0 10px;cursor:pointer;font-size:15px;color:var(--ink);transition:.15s}
.pbtn:hover{background:var(--green-soft);border-color:var(--green)}
.pbtn.play{background:var(--amber);border-color:var(--amber);font-size:18px;width:52px}
.pbtn.play:hover{background:#f0ab0e}
.pbtn.on{background:var(--green);color:#fff;border-color:var(--green)}
.seek{flex:1;min-width:160px;display:flex;align-items:center;gap:10px}
.seek input[type=range]{flex:1;accent-color:var(--green);height:5px}
.time{font-size:12px;color:var(--ink-soft);white-space:nowrap;font-variant-numeric:tabular-nums}
.speed{display:flex;gap:4px}
.speed .pbtn{height:34px;min-width:0;font-size:12px;padding:0 8px}
.ab{display:flex;gap:4px;align-items:center}
.ab .tagpt{font-size:11px;color:var(--ink-soft)}
.no-audio{color:var(--ink-faint);font-size:13px;padding:6px 0}
.yt-msg{font-size:12.5px;background:#fff8e1;border:1px solid #f0c040;border-radius:10px;
  padding:10px 14px;margin-bottom:10px;line-height:1.6;color:#5a4000}
.yt-msg a{color:#1a73e8;font-weight:600}

/* ============================================================
   6. THANH ĐỊNH DẠNG (Word-like) + TRANSCRIPT
   ============================================================ */
.rtbar{display:flex;flex-wrap:wrap;gap:4px;padding:8px;border:1px solid var(--paper-3);
  background:var(--paper);border-radius:10px;margin-bottom:10px}
.rtbar button{border:1px solid transparent;background:transparent;border-radius:7px;
  min-width:30px;height:30px;cursor:pointer;font-size:13px;color:var(--ink);padding:0 6px}
.rtbar button:hover{background:var(--green-soft)}
.rtbar .sep{width:1px;background:var(--paper-3);margin:2px 4px}
.swatch{width:20px;height:20px;border-radius:6px;border:1px solid rgba(0,0,0,.12);cursor:pointer}
.rtbar label{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--ink-soft)}

.editor{
  font-family:var(--han);
  font-size:var(--transcript-size);
  line-height:var(--transcript-lh);
  color:var(--ink);
  background:var(--paper-2);
  border:1px dashed transparent;
  border-radius:12px;
  padding:10px 12px;
  min-height:40px;
  outline:none;
}
.editor:focus{border-color:var(--green);background:#fffef8}
.editor[data-empty="1"]:empty::before{content:attr(data-ph);color:var(--ink-faint);font-family:var(--latin);font-size:14px}
.editor.latin{font-family:var(--latin);font-size:16px;line-height:1.7}
.collapsed{display:none}

/* Từ vựng đã lưu trong transcript */
.vocab-hit{
  background:var(--hl-yellow);
  font-weight:700;
  border-radius:5px;padding:0 2px;cursor:pointer;
  box-shadow:inset 0 -2px 0 rgba(255,186,24,.5);
}
.vocab-hit:hover{background:var(--amber)}
/* highlight cho GHI CHÚ trong transcript */
.note-hit{background:var(--hl-blue);border-bottom:2px solid #7fb8d6;border-radius:5px;
  padding:0 2px;cursor:pointer}
.note-hit:hover{background:#bfe0f0}

/* ---- THANH ĐỊNH DẠNG DÙNG CHUNG (nổi trên ô đang gõ) ---- */
.fmtbar{
  position:fixed;z-index:70;display:none;align-items:center;flex-wrap:wrap;gap:4px;
  background:var(--ink);color:#fff;padding:6px;border-radius:12px;box-shadow:var(--shadow);
  max-width:min(96vw,640px);
}
.fmtbar.show{display:flex}
.fmtbar button{border:1px solid transparent;background:transparent;color:#fff;border-radius:7px;
  min-width:30px;height:30px;cursor:pointer;font-size:13px;padding:0 7px}
.fmtbar button:hover{background:rgba(255,255,255,.18)}
.fmtbar .sep{width:1px;height:20px;background:rgba(255,255,255,.25);margin:0 3px}
.fmtbar .lbl{font-size:11px;opacity:.8;margin:0 2px}
.fmtbar .swatch{width:19px;height:19px;border-radius:5px;border:1px solid rgba(255,255,255,.35);cursor:pointer}

/* --- Bảng màu popup --- */
.color-pop{
  position:fixed;z-index:200;background:var(--paper-2);border:1px solid var(--paper-3);
  border-radius:14px;box-shadow:var(--shadow);padding:10px;display:none;
  width:230px;
}
.color-pop.show{display:block}
.color-pop-title{font-size:11px;font-weight:700;color:var(--ink-soft);margin-bottom:7px;
  letter-spacing:.4px;text-transform:uppercase}
.color-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin-bottom:8px}
.color-grid span{
  width:18px;height:18px;border-radius:5px;cursor:pointer;
  border:1.5px solid transparent;transition:.1s;display:inline-block;
}
.color-grid span:hover{transform:scale(1.25);border-color:rgba(0,0,0,.3)}
.color-custom{display:flex;align-items:center;gap:6px;border-top:1px solid var(--paper-3);padding-top:8px;font-size:12px;color:var(--ink-soft)}
.color-custom input[type=color]{width:34px;height:28px;border:1px solid var(--paper-3);border-radius:6px;
  padding:1px;cursor:pointer;background:var(--paper)}
.color-no-hl{font-size:11px;padding:2px 8px;border:1px solid var(--paper-3);background:var(--paper);
  color:var(--ink-soft);border-radius:6px;cursor:pointer;height:28px}
.color-no-hl:hover{background:var(--green-soft)}

/* ---- Tab trong ngăn phải ---- */
.rtabs{display:flex;gap:6px;padding:0 14px 10px}
.rtabs .pill{flex:1;text-align:center}

/* ---- Khung YouTube / video ---- */
.yt-wrap{position:relative;width:100%;padding-top:56.25%;border-radius:12px;overflow:hidden;
  margin-bottom:12px;background:#000}
.yt-wrap iframe,.yt-wrap #ytmount,.yt-wrap #ytmount iframe{
  position:absolute;inset:0;width:100%;height:100%;border:0}

/* ---- Date picker ôn tập ---- */
.dot .dt{font-family:var(--latin);font-size:10px;border:1px solid var(--paper-3);border-radius:7px;
  padding:2px 4px;background:var(--paper);color:var(--ink-soft);width:118px;cursor:pointer}

/* ---- Thanh công cụ định dạng thứ 2 (dưới topbar) ---- */
.topbar-2nd{
  position:fixed;top:60px;left:0;right:0;z-index:34;
  background:var(--paper);border-bottom:1px solid var(--paper-3);
  display:none;align-items:center;gap:5px;padding:0 14px;
  height:46px;box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.topbar-2nd.show{display:flex}
.topbar-2nd .tb2-sep{width:1px;height:22px;background:var(--paper-3);margin:0 4px;flex:0 0 auto}
.topbar-2nd select{border:1px solid var(--paper-3);background:var(--paper-2);border-radius:8px;
  padding:3px 7px;font-size:12px;font-family:inherit;cursor:pointer;color:var(--ink);height:30px;max-width:120px}
.topbar-2nd .tb2btn{border:1px solid var(--paper-3);background:var(--paper-2);color:var(--ink);
  border-radius:8px;padding:0 8px;font-size:12px;height:30px;min-width:30px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:3px;white-space:nowrap}
.topbar-2nd .tb2btn:hover{background:var(--green-soft);border-color:var(--green)}
.topbar-2nd .tb2btn.on{background:var(--green);color:#fff;border-color:var(--green)}
.topbar-2nd .tb2crumb{flex:1;font-size:12px;color:var(--ink-soft);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px}
.topbar-2nd .tb2crumb b{color:var(--ink)}
.topbar-2nd .tb2nav{font-size:13px;font-weight:600;min-width:28px;height:28px}

/* ---- Split layout transcript + dịch ---- */
.split-pane{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
@media(max-width:680px){.split-pane{grid-template-columns:1fr}}
.split-col-label{font-size:11px;font-weight:700;letter-spacing:.6px;
  text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px;display:flex;align-items:center;gap:6px}

/* ---- Badge số lần ôn trong cây ---- */
.rep-badge{display:inline-flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#fff;background:var(--green);
  border-radius:20px;padding:1px 5px;margin-left:4px;min-width:18px}
.node-row.active .rep-badge{background:#fff;color:#3a6b1e}

/* ---- Video resize handle ---- */
.yt-resize-handle{
  height:12px;cursor:ns-resize;display:flex;align-items:center;
  justify-content:center;margin-top:-2px;margin-bottom:10px;
  border-radius:0 0 8px 8px;background:transparent;
}
.yt-resize-handle::after{content:'';width:36px;height:4px;
  background:var(--paper-3);border-radius:99px;transition:.15s}
.yt-resize-handle:hover::after{background:var(--green);width:48px}

/* ---- PiP floating mini-player ---- */
#pipFloat{
  position:fixed;bottom:22px;right:22px;width:300px;
  background:var(--paper-2);border:1px solid var(--paper-3);
  border-radius:14px;box-shadow:var(--shadow);
  z-index:48;display:none;overflow:hidden;
}
#pipFloat.show{display:block}
.pip-head{
  display:flex;align-items:center;gap:6px;padding:7px 10px;
  background:var(--paper-3);border-bottom:1px solid var(--paper-3);
}
.pip-head-title{flex:1;font-size:11px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink-soft)}
.pip-head button{border:none;background:transparent;cursor:pointer;
  font-size:13px;border-radius:6px;width:24px;height:24px;
  display:grid;place-items:center;color:var(--ink-soft)}
.pip-head button:hover{background:rgba(0,0,0,.08)}
.pip-yt-wrap{position:relative;padding-top:56.25%;background:#000}
.pip-yt-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.pip-audio-bar{padding:8px 10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pip-audio-bar button{border:1px solid var(--paper-3);background:var(--paper);
  border-radius:8px;min-width:32px;height:32px;cursor:pointer;font-size:13px}
.pip-audio-bar .pip-seek{flex:1;min-width:80px;accent-color:var(--green);height:4px}
.pip-time{font-size:10px;color:var(--ink-soft);white-space:nowrap;font-variant-numeric:tabular-nums}

/* ---- Điều chỉnh padding khi có topbar 2 ---- */
body.has-tb2 .main{padding-top:calc(60px + 46px + 24px)}
.ncard.flash{animation:flash 1.1s ease}
.ncard .nhead{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:var(--hl-blue)}
.ncard .nhead .ex{flex:1;font-family:var(--han);font-size:15px;line-height:1.5;color:#2b3d47}
.ncard .nhead .x{border:none;background:rgba(0,0,0,.08);cursor:pointer;border-radius:7px;width:26px;height:26px;flex:0 0 auto}
.ncard .nbody{padding:10px 12px}

/* ============================================================
   7. CÂU HỎI TRẮC NGHIỆM
   ============================================================ */
.q{border:1px solid var(--paper-3);border-radius:12px;padding:12px 14px;margin-bottom:10px;background:var(--paper)}
.q .qnum{font-weight:700;color:var(--green-deep);margin-right:6px}
.q .qtext{font-family:var(--han);font-size:18px;line-height:1.6}
.opts{margin-top:10px;display:grid;gap:6px}
.opt{display:flex;gap:9px;align-items:flex-start;padding:8px 10px;border:1px solid var(--paper-3);

.opt .lab{font-family:var(--latin);font-weight:700;color:var(--ink-soft);flex:0 0 auto}
.opt:hover{border-color:var(--green)}

.opt.wrong{border-color:var(--orange);background:#fbe3d8}
.explain{margin-top:8px;font-size:13.5px;color:var(--ink-soft);background:var(--green-soft);
  border-radius:9px;padding:8px 11px;line-height:1.6;font-family:var(--han)}
.explain b{font-family:var(--latin)}
.q-edit input,.q-edit textarea{width:100%;font-family:inherit;font-size:14px;border:1px solid var(--paper-3);
  border-radius:8px;padding:7px 9px;margin:3px 0;background:var(--paper-2);color:var(--ink)}
.q-edit .opt-edit{display:flex;align-items:center;gap:7px;margin:3px 0}
.q-edit .opt-edit input[type=text]{flex:1;margin:0}
.q-edit .opt-edit input[type=radio]{accent-color:var(--green);width:18px;height:18px}

.mode-tabs{display:flex;gap:6px;margin-bottom:12px}

/* ============================================================
   8. ÔN TẬP (lặp ngắt quãng)
   ============================================================ */
.review-dots{display:flex;gap:8px;flex-wrap:wrap}
.dot{position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.dot .ball{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;font-weight:700;

.dot:hover .ball{border-color:var(--green)}
.dot.done .ball{background:var(--green);border-color:var(--green);color:#fff}
.dot .date{font-size:10px;color:var(--ink-faint);min-height:12px}

/* ============================================================
   9. THẺ TỪ VỰNG (ngăn phải)

.vocab-search{width:100%;height:38px;border-radius:10px;border:1px solid var(--paper-3);

.vcard-head{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer}

   ============================================================ */

<script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>
<script>
"use strict";
/* ============================================================
   ⚙️ TIỆN ÍCH CHUNG
   ============================================================ */
const $  = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const uid = ()=> 'id_'+Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const todayStr = ()=> new Date().toISOString().slice(0,10);
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function fmtTime(s){if(!isFinite(s))return'0:00';s=Math.max(0,Math.floor(s));const m=Math.floor(s/60);const r=s%60;return m+':'+String(r).padStart(2,'0');}

/* ============================================================
   💾 LỚP INDEXEDDB  (2 store: meta = key/value, audio = Blob)
   ============================================================ */
const DB_NAME='tinh_nghe_db', DB_VER=1;
let _db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains('meta'))  db.createObjectStore('meta');
      if(!db.objectStoreNames.contains('audio')) db.createObjectStore('audio');
    };
    r.onsuccess=()=>{_db=r.result;res(_db);};
    r.onerror=()=>rej(r.error);
  });
}
function idbGet(store,key){return new Promise((res,rej)=>{const tx=_db.transaction(store,'readonly');const rq=tx.objectStore(store).get(key);rq.onsuccess=()=>res(rq.result);rq.onerror=()=>rej(rq.error);});}
function idbSet(store,key,val){return new Promise((res,rej)=>{const tx=_db.transaction(store,'readwrite');const rq=tx.objectStore(store).put(val,key);rq.onsuccess=()=>res();rq.onerror=()=>rej(rq.error);});}
function idbDel(store,key){return new Promise((res,rej)=>{const tx=_db.transaction(store,'readwrite');const rq=tx.objectStore(store).delete(key);rq.onsuccess=()=>res();rq.onerror=()=>rej(rq.error);});}

/* ============================================================
   🗂️ TRẠNG THÁI ỨNG DỤNG
   roots: cây thư mục (mỗi node folder|item). vocab: thẻ dùng chung.
   ============================================================ */
let state = null;          // dữ liệu metadata
let currentItemId = null;  // bài đang mở
let fileHandle = null;     // FileSystemFileHandle (nếu đã kết nối)

function defaultState(){
  // ---- seed mẫu để nghịch thử ----
  const sampleItem = (title)=>({
    id:uid(), type:'item', title,
    audio:{mode:'none'},
    hasTranscript:true, hasTranslation:true,
    transcriptHtml:'', translationHtml:'',
    questions:[], reviews:{marks:{},note:''},
    notes:[], goodIdeas:'', dictation:'',
    tsizePx:21, tlh:2.0
  });
  const it1 = sampleItem('Bài mẫu · Hội thoại ở quán cà phê');
  it1.transcriptHtml='<div>A：你好，请问要喝点什么？</div><div>B：我要一杯<b>热</b>美式，谢谢。</div><div>A：好的，请稍等。</div>';
  it1.translationHtml='<div>A: Xin chào, anh/chị muốn uống gì ạ?</div><div>B: Cho tôi một ly Americano nóng, cảm ơn.</div><div>A: Vâng, xin chờ một chút.</div>';
  it1.questions=[{id:uid(),num:'1',text:'顾客点了什么饮料？',options:['热美式','冰拿铁','绿茶','果汁'],correct:0,explain:'B 说 “我要一杯热美式”。'}];

  const it2 = sampleItem('Bài mẫu · Bản tin ngắn');
  it2.hasTranslation=true;
  it2.transcriptHtml='<div>据报道，本周末全市将举办读书节，<u>免费</u>对公众开放。</div>';
  it2.translationHtml='<div>Theo đưa tin, cuối tuần này toàn thành phố sẽ tổ chức ngày hội đọc sách, mở cửa miễn phí cho công chúng.</div>';

  const f=(name,children=[])=>({id:uid(),type:'folder',name,children});
  return {
    version:1,
    roots:[
      f('HSK',[
        f('HSK5',[ f('SBT',[ f('Đề 1',[it1]) ]), f('HANBAN',[]), f('Tinh giảng',[]) ]),
        f('HSK6',[ f('Xanh lá',[ f('Đề 1',[it2]) ]) ]),
      ]),
      f('Nguồn ngoài',[
        f('Bản tin',[]), f('Hội thoại đời sống',[]), f('Podcast',[]),
      ]),
    ],
    vocab:[],
    settings:{ hlColor:'var(--hl-yellow)', vocabColor:'#FFF1A8', tlh:2.0 }
  };
}

/* ----- Lưu / nạp metadata ----- */
const saveMeta = debounce(async ()=>{
  try{
    await idbSet('meta','state',state);
    try{ localStorage.setItem('tinh_nghe_state', JSON.stringify(state)); }catch(_){}
    // ghi ra file đã kết nối (nếu có)
    if(fileHandle){ await writeHandle(); }
  }catch(e){ console.warn('saveMeta lỗi',e); }
},400);

async function loadMeta(){
  let s=null;
  try{ s=await idbGet('meta','state'); }catch(_){}
  if(!s){ try{ const ls=localStorage.getItem('tinh_nghe_state'); if(ls) s=JSON.parse(ls); }catch(_){} }
  state = s || defaultState();
  if(!state.vocab) state.vocab=[];
  if(!state.settings) state.settings={hlColor:'var(--hl-yellow)',vocabColor:'#FFF1A8',tlh:2.0};
  // nạp lại file handle đã kết nối
  try{ fileHandle = await idbGet('meta','fileHandle') || null; }catch(_){}
}

/* ============================================================
   🌳 THAO TÁC TRÊN CÂY
   ============================================================ */
function walk(nodes,cb,parent=null){ for(const n of nodes){ cb(n,parent); if(n.children) walk(n.children,cb,n); } }
function findNode(id,nodes=state.roots,parent=null){
  for(const n of nodes){ if(n.id===id) return {node:n,parent,list:nodes};
    if(n.children){ const r=findNode(id,n.children,n); if(r) return r; } }
  return null;
}
function findItem(id){ let f=null; walk(state.roots,n=>{ if(n.id===id&&n.type==='item') f=n; }); return f; }
function pathOf(id){
  const names=[]; let cur=id;
  while(cur){ const r=findNode(cur); if(!r) break; names.unshift(r.node.name||r.node.title); cur=r.parent?r.parent.id:null; }
  return names;
}
function removeNode(id){ const r=findNode(id); if(r){ const i=r.list.indexOf(r.node); r.list.splice(i,1); return r.node; } }
function isDescendant(ancestorId,maybeChildId){
  const r=findNode(ancestorId); if(!r) return false; let found=false;
  walk([r.node],n=>{ if(n.id===maybeChildId) found=true; }); return found && ancestorId!==maybeChildId;
}

/* ============================================================
   🎨 RENDER CÂY THƯ VIỆN (drawer trái)
   ============================================================ */
const expanded = new Set();
function renderTree(){
  const root=$('#tree'); root.innerHTML='';
  state.roots.forEach(n=>root.appendChild(nodeEl(n)));
}
function countItems(node){ let c=0; walk([node],n=>{ if(n.type==='item') c++; }); return node.type==='item'?0:c; }

function nodeEl(node){
  const wrap=document.createElement('div'); wrap.className='node';
  const row=document.createElement('div'); row.className='node-row';
  row.draggable=true; row.dataset.id=node.id;
  if(node.type==='item'&&node.id===currentItemId) row.classList.add('active');

  const isFolder=node.type==='folder';
  const open=expanded.has(node.id);
  // mũi tên xếp/mở
  const tw=document.createElement('span'); tw.className='twisty';
  tw.textContent = isFolder ? (open?'▾':'▸') : '';
  tw.onclick=e=>{e.stopPropagation(); if(!isFolder)return; open?expanded.delete(node.id):expanded.add(node.id); renderTree();};
  // icon
  const ic=document.createElement('span'); ic.className='node-ic';
  ic.textContent = isFolder ? (open?'📂':'📁') : '🎧';
  // tên
  const nm=document.createElement('span'); nm.className='node-name'; nm.textContent=node.name||node.title;
  // meta
  const meta=document.createElement('span'); meta.className='node-meta';
  if(isFolder){ const c=countItems(node); meta.textContent=c?c+' bài':''; }
  else{
    const marks=node.reviews?.marks||{};
    const rc=Object.keys(marks).length;
    if(rc>0){
      const badge=document.createElement('span'); badge.className='rep-badge';
      badge.title=`Đã ôn ${rc} mốc`; badge.textContent='√'+rc;
      meta.appendChild(badge);
    }
  }
  // actions
  const act=document.createElement('span'); act.className='node-act';
  if(isFolder){
    act.appendChild(mkAct('📁','Thêm thư mục con',e=>{e.stopPropagation();promptAdd(node,'folder');}));
    act.appendChild(mkAct('🎧','Thêm bài nghe',e=>{e.stopPropagation();promptAdd(node,'item');}));
  }
  act.appendChild(mkAct('✏️','Đổi tên',e=>{e.stopPropagation();renameNode(node);}));
  act.appendChild(mkAct('↕','Di chuyển',e=>{e.stopPropagation();openMoveDialog(node);}));
  act.appendChild(mkAct('▲','Lên',e=>{e.stopPropagation();reorder(node,-1);}));
  act.appendChild(mkAct('▼','Xuống',e=>{e.stopPropagation();reorder(node,1);}));
  act.appendChild(mkAct('🗑','Xoá',e=>{e.stopPropagation();delNode(node);}));

  row.append(tw,ic,nm,meta,act);
  row.onclick=()=>{ if(isFolder){ open?expanded.delete(node.id):expanded.add(node.id); renderTree(); }
                    else { openItem(node.id); closeDrawer('left'); } };

  // --- kéo thả ---
  row.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',node.id);e.dataTransfer.effectAllowed='move';});
  row.addEventListener('dragover',e=>{ if(isFolder){e.preventDefault();row.classList.add('dragover');} });
  row.addEventListener('dragleave',()=>row.classList.remove('dragover'));
  row.addEventListener('drop',e=>{
    e.preventDefault(); row.classList.remove('dragover');
    const dragId=e.dataTransfer.getData('text/plain');
    if(!isFolder||dragId===node.id) return;
    moveInto(dragId,node.id);
  });

  wrap.appendChild(row);
  if(isFolder&&open){
    const ch=document.createElement('div'); ch.className='children';
    node.children.forEach(c=>ch.appendChild(nodeEl(c)));
    wrap.appendChild(ch);
  }
  return wrap;
}
function mkAct(t,title,fn){const b=document.createElement('button');b.textContent=t;b.title=title;b.onclick=fn;return b;}

function moveInto(dragId,folderId){
  if(isDescendant(dragId,folderId)){ toast('Không thể di chuyển vào chính nó.'); return; }
  const node=removeNode(dragId); if(!node) return;
  const tgt=findNode(folderId); tgt.node.children.push(node);
  expanded.add(folderId); renderTree(); saveMeta(); toast('Đã di chuyển.');
}
function reorder(node,dir){
  const r=findNode(node.id); const i=r.list.indexOf(r.node); const j=i+dir;
  if(j<0||j>=r.list.length) return;
  r.list.splice(i,1); r.list.splice(j,0,r.node); renderTree(); saveMeta();
}
function delNode(node){
  const what = node.type==='folder' ? `thư mục “${node.name}” và toàn bộ bên trong` : `bài “${node.title}”`;
  if(!confirm('Xoá '+what+' ?')) return;
  // dọn audio blob của các item con
  walk([node],n=>{ if(n.type==='item'&&n.audio&&n.audio.mode==='file'&&n.audio.key) idbDel('audio',n.audio.key); });
  if(currentItemId && findNode(currentItemId)===null){}
  removeNode(node.id);
  if(node.id===currentItemId || (node.type==='folder'&&!findItem(currentItemId))){ currentItemId=null; renderMain(); }
  renderTree(); saveMeta(); toast('Đã xoá.');
}
function renameNode(node){
  openPrompt('Đổi tên', node.name||node.title, v=>{
    if(!v.trim())return; if(node.type==='folder')node.name=v.trim(); else node.title=v.trim();
    renderTree(); if(node.id===currentItemId) renderMain(); saveMeta();
  });
}
function promptAdd(folder,type){
  const label = type==='folder'?'Tên thư mục mới':'Tên bài nghe mới';
  openPrompt(label, '', v=>{
    if(!v.trim())return;
    let node;
    if(type==='folder') node={id:uid(),type:'folder',name:v.trim(),children:[]};
    else node={id:uid(),type:'item',title:v.trim(),audio:{mode:'none'},
      hasTranscript:true,hasTranslation:true,transcriptHtml:'',translationHtml:'',
      questions:[],reviews:{marks:{},note:''},notes:[],goodIdeas:'',dictation:'',tsizePx:21,tlh:2.0};
    folder.children.push(node); expanded.add(folder.id);
    renderTree(); saveMeta();
    if(type==='item'){ openItem(node.id); closeDrawer('left'); }
  });
}

async function buildPlayerBody(item){
  const body=$('#playerBody'); if(!body)return;
  // dọn trình phát cũ
  if(currentPlayer){ try{currentPlayer.destroy();}catch(_){} currentPlayer=null; }
  try{ audio.pause(); }catch(_){}
  if(curObjURL){ URL.revokeObjectURL(curObjURL); curObjURL=null; }
  abA=abB=null; loopAll=false;

  if(item.audio.mode==='none'){
    body.innerHTML='<div class="no-audio">Chưa có âm thanh. Bấm <b>🎵 Nguồn</b> để chọn file từ máy, dán link audio/video trực tiếp, hoặc dán <b>link YouTube</b>.</div>';
    return;
  }

  if(item.audio.mode==='youtube'){
    const onFile = location.protocol==='file:';
    const warn = onFile
      ? `<div class="yt-msg">⚠️ App đang chạy qua <b>file://</b> nên YouTube thường báo lỗi cấu hình và không phát được. Hãy mở app qua <b>website / GitHub Pages</b> hoặc dùng file âm thanh. Tạm thời: <a href="https://www.youtube.com/watch?v=${esc(item.audio.videoId)}" target="_blank" rel="noopener">xem trên YouTube ↗</a></div>`
      : '';
    body.innerHTML = warn + '<div class="yt-wrap" id="ytWrap"><div id="ytmount"></div></div><div class="yt-resize-handle" id="ytResizeHandle" title="Kéo để thay đổi kích thước video"></div>' + controlsHtml();
    currentPlayer = makeYTPlayer(item.audio.videoId);
    setTimeout(()=>wireVideoResize(),100);
  }else{
    // file trong IndexedDB hoặc URL trực tiếp (mp3/m4a/wav/mp4…)
    if(item.audio.mode==='file' && item.audio.key){
      try{ const blob=await idbGet('audio',item.audio.key);
        if(blob){ curObjURL=URL.createObjectURL(blob); audio.src=curObjURL; }
        else { item.audio.mode='none'; body.innerHTML='<div class="no-audio">Không tìm thấy file đã lưu. Hãy nạp lại.</div>'; return; }
      }catch(_){ body.innerHTML='<div class="no-audio">Lỗi đọc file âm thanh.</div>'; return; }
    }else if(item.audio.mode==='url' && item.audio.url){ audio.src=item.audio.url; }
    body.innerHTML = controlsHtml();
    currentPlayer = makeAudioPlayer();
  }
  wireControls();
}

// ---- Bộ điều khiển cho thẻ <audio> (file / URL trực tiếp) ----
function makeAudioPlayer(){
  let tickCb=null;
  audio.playbackRate=1; audio.loop=false;
  audio.ontimeupdate=()=>tickCb&&tickCb();
  audio.onplay=()=>tickCb&&tickCb();
  audio.onpause=()=>tickCb&&tickCb();
  audio.onloadedmetadata=()=>tickCb&&tickCb();
  audio.onended=()=>{ if(loopAll){ audio.currentTime=0; audio.play(); } };
  return {
    play:()=>audio.play(), pause:()=>audio.pause(),
    isPaused:()=>audio.paused,
    getTime:()=>audio.currentTime||0, getDur:()=>audio.duration||0,
    setRate:r=>audio.playbackRate=r, seekTo:t=>audio.currentTime=t,
    onTick:cb=>{tickCb=cb;},
    destroy:()=>{ try{audio.pause();}catch(_){} audio.ontimeupdate=audio.onplay=audio.onpause=audio.onended=audio.onloadedmetadata=null; }
  };
}

// ---- Bộ điều khiển cho YouTube (IFrame API) ----
// nạp YouTube IFrame API (chỉ 1 lần; cần internet)
let _ytReady=null;
function loadYTApi(){
  if(window.YT && window.YT.Player) return Promise.resolve();
  if(_ytReady) return _ytReady;
  _ytReady=new Promise(res=>{ window.onYouTubeIframeAPIReady=()=>res();
    const s=document.createElement('script'); s.src='https://www.youtube.com/iframe_api'; document.head.appendChild(s); });
  return _ytReady;
}

/* =========================================================
   🎬 YOUTUBE PLAYER – YT.Player + origin:location.origin
   ========================================================= */
function makeYTPlayer(videoId){
  let p=null, paused=true, tickCb=null, timer=null;
  loadYTApi().then(()=>{
    p=new YT.Player('ytmount',{ videoId,
      playerVars:{rel:0,playsinline:1,origin:location.origin},
      events:{
        onReady:()=>{ tickCb&&tickCb(); },
        onStateChange:e=>{ paused=(e.data!==YT.PlayerState.PLAYING); tickCb&&tickCb();
          if(e.data===YT.PlayerState.ENDED && loopAll){ p.seekTo(0,true); p.playVideo(); } },
        onError:()=>{ const b=$('#playerBody'); if(b && !b.querySelector('.yt-msg')){
          const m=document.createElement('div'); m.className='yt-msg';
          m.innerHTML=`⚠️ Không phát được video này trong app (có thể video chặn nhúng, hoặc app đang chạy ở chế độ <b>file://</b>). Thử <a href="https://www.youtube.com/watch?v=${esc(videoId)}" target="_blank" rel="noopener">mở trên YouTube ↗</a> hoặc chạy app như một website.`;
          b.prepend(m); } }
      }});
  }).catch(()=>toast('Không tải được YouTube (cần internet).'));
  timer=setInterval(()=>{ tickCb&&tickCb(); }, 250);
  const t=()=> (p&&p.getCurrentTime)?p.getCurrentTime():0;
  return {
    play:()=>p&&p.playVideo&&p.playVideo(), pause:()=>p&&p.pauseVideo&&p.pauseVideo(),
    isPaused:()=>paused,
    getTime:t, getDur:()=> (p&&p.getDuration)?p.getDuration():0,
    setRate:r=>p&&p.setPlaybackRate&&p.setPlaybackRate(r),
    seekTo:s=>p&&p.seekTo&&p.seekTo(s,true),
    onTick:cb=>{tickCb=cb;},
    destroy:()=>{ if(timer)clearInterval(timer); try{p&&p.destroy&&p.destroy();}catch(_){} }
  };
}

// ---- Gắn sự kiện cho thanh điều khiển (chung cho mọi loại nguồn) ----
function wireControls(){
  const play=$('#pPlay'), seek=$('#pSeek');
  currentPlayer.setRate(1);
  const refresh=()=>{
    if(!play.isConnected) return;
    play.textContent = currentPlayer.isPaused()?'▶':'⏸';
    const cur=currentPlayer.getTime(), dur=currentPlayer.getDur();
    const c=$('#pCur'), d=$('#pDur');
    if(c)c.textContent=fmtTime(cur);
    if(d)d.textContent=fmtTime(dur);
    if(seek && dur && document.activeElement!==seek) seek.value=(cur/dur*1000)||0;
    // lặp A–B
    if(abA!=null && abB!=null && cur>=abB) currentPlayer.seekTo(abA);
  };
  currentPlayer.onTick(refresh);
  play.onclick=()=>{ currentPlayer.isPaused()?currentPlayer.play():currentPlayer.pause(); setTimeout(refresh,60); };
  seek.oninput=()=>{ const dur=currentPlayer.getDur(); if(dur) currentPlayer.seekTo(seek.value/1000*dur); };
  $('#pBack').onclick =()=> currentPlayer.seekTo(Math.max(0,currentPlayer.getTime()-5));
  $('#pFwd').onclick  =()=> currentPlayer.seekTo(currentPlayer.getTime()+5);
  $('#pRestart').onclick=()=>{ currentPlayer.seekTo(0); currentPlayer.play(); };
  $$('#pSpeed button').forEach(b=>b.onclick=()=>{ $$('#pSpeed button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); currentPlayer.setRate(parseFloat(b.dataset.s)); });
  $('#abSetA').onclick=()=>{ abA=currentPlayer.getTime(); if(abB!=null&&abB<=abA)abB=null; updAB(); };
  $('#abSetB').onclick=()=>{ abB=currentPlayer.getTime(); if(abA!=null&&abB<=abA){abB=null;toast('Điểm B phải sau A.');} updAB(); };
  $('#abClear').onclick=()=>{ abA=abB=null; updAB(); };
  $('#loopAll').onclick=()=>{ loopAll=!loopAll; $('#loopAll').classList.toggle('on',loopAll); };
  refresh();
}
function updAB(){ const i=$('#abInfo'); if(!i)return;
  i.textContent = (abA!=null?'A '+fmtTime(abA):'A –') + '  ' + (abB!=null?'B '+fmtTime(abB):'B –') + ((abA!=null&&abB!=null)?'  🔂':''); }

/* ---------- (b) THANH ĐỊNH DẠNG DÙNG CHUNG ---------- */
// Mọi ô soạn thảo gắn class "fmt". Khi focus vào ô nào, thanh nổi lên trên ô đó.
let activeFmt=null;
function fireInput(el){ el.dispatchEvent(new Event('input',{bubbles:true})); }

function showFmtbar(el){ activeFmt=el; const bar=$('#fmtbar'); bar.classList.add('show'); positionFmtbar(el); }
function hideFmtbar(){ $('#fmtbar').classList.remove('show'); activeFmt=null; }
function positionFmtbar(el){
  const bar=$('#fmtbar'); const r=el.getBoundingClientRect();
  let top=r.top-bar.offsetHeight-8;
  if(top<8) top=Math.min(r.bottom+8, window.innerHeight-bar.offsetHeight-8); // không đủ chỗ trên → xuống dưới
  let left=Math.max(8, Math.min(r.left, window.innerWidth-bar.offsetWidth-10));
  bar.style.top=top+'px'; bar.style.left=left+'px';
}
function persistEditorStyle(el){
  // lưu cỡ chữ / giãn dòng cho transcript & bản dịch
  const it=findItem(currentItemId); if(!it)return;
  if(el.id==='transcriptEditor'){ it.tsizePx=parseInt(el.style.fontSize)||21; it.tlh=parseFloat(el.dataset.lh)||2; saveMeta(); }
  else if(el.id==='translationEditor'){ it.trSizePx=parseInt(el.style.fontSize)||18; it.trLh=parseFloat(el.dataset.lh)||1.9; saveMeta(); }
}
function adjustFontSize(el,dir){
  const cur=parseInt(el.style.fontSize)||parseInt(getComputedStyle(el).fontSize)||18;
  el.style.fontSize=Math.min(40,Math.max(13,cur+dir*2))+'px'; persistEditorStyle(el);
}
function adjustLineHeight(el,dir){
  let lh=parseFloat(el.dataset.lh)||parseFloat(getComputedStyle(el).lineHeight)/(parseInt(getComputedStyle(el).fontSize)||1)||1.8;
  lh=Math.min(3,Math.max(1.2,lh+dir*0.15)); el.dataset.lh=lh; el.style.lineHeight=lh; persistEditorStyle(el);
}
function wireFmtbar(){
  const bar=$('#fmtbar');
  bar.querySelectorAll('button[data-cmd]').forEach(b=>b.onmousedown=e=>{e.preventDefault(); if(!activeFmt)return;
    activeFmt.focus(); document.execCommand(b.dataset.cmd,false,null); fireInput(activeFmt);});
  bar.querySelectorAll('.swatch[data-hl]').forEach(s=>s.onmousedown=e=>{e.preventDefault(); if(!activeFmt)return;
    activeFmt.focus(); document.execCommand('styleWithCSS',false,true);
    document.execCommand('hiliteColor',false,s.dataset.hl); fireInput(activeFmt);});
  bar.querySelectorAll('.swatch[data-fc]').forEach(s=>s.onmousedown=e=>{e.preventDefault(); if(!activeFmt)return;
    activeFmt.focus(); document.execCommand('styleWithCSS',false,true);
    document.execCommand('foreColor',false,s.dataset.fc); fireInput(activeFmt);});
  bar.querySelectorAll('button[data-sz]').forEach(b=>b.onmousedown=e=>{e.preventDefault(); if(activeFmt)adjustFontSize(activeFmt,parseInt(b.dataset.sz));});
  bar.querySelectorAll('button[data-lh]').forEach(b=>b.onmousedown=e=>{e.preventDefault(); if(activeFmt)adjustLineHeight(activeFmt,parseInt(b.dataset.lh));});
  // theo dõi focus của mọi ô .fmt
  document.addEventListener('focusin',e=>{ const el=e.target.closest&&e.target.closest('.fmt'); if(el) showFmtbar(el); });
  document.addEventListener('focusout',()=>{ setTimeout(()=>{ const a=document.activeElement;
    if(!a || !(a.closest&&(a.closest('.fmt')||a.closest('#fmtbar')))) hideFmtbar(); },120); });
  window.addEventListener('scroll',()=>{ if(activeFmt) positionFmtbar(activeFmt); },true);
  window.addEventListener('resize',()=>{ if(activeFmt) positionFmtbar(activeFmt); });
  // bảng màu
  wireColorPicker();
}

/* ============================================================

let _colorMode='hl', _colorCallback=null;
function wireColorPicker(){
  // điền màu vào grid
  const grid=$('#colorGrid'); if(!grid) return;
  COLOR_PALETTE.forEach(c=>{
    const s=document.createElement('span'); s.style.background=c; s.dataset.c=c;
    s.title=c;
    s.onclick=()=>applyColorPick(c);
    grid.appendChild(s);
  });
  // custom input
  const ci=$('#colorCustom');
  if(ci) ci.addEventListener('input',()=>applyColorPick(ci.value),false);
  // bỏ highlight/màu chữ
  const nh=$('#colorNoHl');
  if(nh) nh.onclick=()=>{ applyColorPick(_colorMode==='hl'?'transparent':'#33302A'); };
  // đóng khi click ngoài
  document.addEventListener('mousedown',e=>{
    const pop=$('#colorPop'); if(pop&&!pop.contains(e.target)&&!e.target.closest('#fmtHlBtn,#fmtHlOpen,#fmtFcBtn,#fmtFcOpen'))
      pop.classList.remove('show');
  },true);
  // nút mở bảng màu nền
  document.getElementById('fmtHlOpen')?.addEventListener('mousedown',e=>{
    e.preventDefault(); openColorPop('hl',e.currentTarget);
  });
  document.getElementById('fmtHlBtn')?.addEventListener('mousedown',e=>{
    e.preventDefault(); openColorPop('hl',e.currentTarget);
  });
  // nút mở bảng màu chữ
  document.getElementById('fmtFcOpen')?.addEventListener('mousedown',e=>{
    e.preventDefault(); openColorPop('fc',e.currentTarget);
  });
  document.getElementById('fmtFcBtn')?.addEventListener('mousedown',e=>{
    e.preventDefault(); openColorPop('fc',e.currentTarget);
  });
}
function openColorPop(mode,trigger){
  _colorMode=mode;
  const pop=$('#colorPop'); if(!pop) return;
  const title=$('#colorPopTitle');
  if(title) title.textContent=mode==='hl'?'🎨 Màu nền văn bản':'🖊 Màu chữ';
  const nh=$('#colorNoHl');
  if(nh) nh.textContent=mode==='hl'?'✕ Bỏ nền':'↩ Mặc định';
  // Vị trí
  const r=trigger.getBoundingClientRect();
  pop.style.left=Math.max(4,Math.min(window.innerWidth-240,r.left))+'px';
  pop.style.top=(r.bottom+6)+'px';
  pop.classList.add('show');
}
function applyColorPick(color){
  if(!activeFmt) return;
  activeFmt.focus();
  document.execCommand('styleWithCSS',false,true);
  if(_colorMode==='hl') document.execCommand('hiliteColor',false,color);
  else document.execCommand('foreColor',false,color);
  fireInput(activeFmt);
  // cập nhật preview dot
  if(_colorMode==='hl'){ const b=$('#fmtHlBtn'); if(b) b.style.background=color==='transparent'?'#fff':color; }
  else{ const b=$('#fmtFcBtn'); if(b) b.style.background=color; }
  $('#colorPop')?.classList.remove('show');
}

// lưu nội dung 1 editor transcript/translation (giữ nguyên span ghi chú, gỡ span từ vựng)
function saveEditor(ed){
  const it=findItem(currentItemId); if(!it)return;
  const html=stripVocabHighlights(ed.innerHTML);
  if(ed.id==='transcriptEditor') it.transcriptHtml=html;
  else if(ed.id==='translationEditor') it.translationHtml=html;
  saveMeta();
}

// xoá các <span class="vocab-hit"> để lưu HTML "sạch"
function stripVocabHighlights(html){
  const d=document.createElement('div'); d.innerHTML=html;
  d.querySelectorAll('.vocab-hit').forEach(s=>{ const t=document.createTextNode(s.textContent); s.replaceWith(t); });
  d.normalize(); return d.innerHTML;
}
// duyệt text node, bọc từ đã lưu bằng span.vocab-hit (chỉ thay đổi DOM, không lưu)
function applyVocabHighlights(editor){
  if(!editor) return;
  // gỡ highlight cũ trước
  editor.querySelectorAll('.vocab-hit').forEach(s=>{ const t=document.createTextNode(s.textContent); s.replaceWith(t); });
  editor.normalize();
  const words=[...new Set(state.vocab.map(v=>v.word).filter(Boolean))].sort((a,b)=>b.length-a.length);
  if(!words.length) return;
  const color = state.settings.vocabColor || '#FFF1A8';
  const rx = new RegExp(words.map(w=>w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|'),'g');
  const walker=document.createTreeWalker(editor,NodeFilter.SHOW_TEXT,null);
  const todo=[]; let n; while(n=walker.nextNode()){ rx.lastIndex=0; if(n.nodeValue && rx.test(n.nodeValue)) todo.push(n); }
  todo.forEach(node=>{
    const frag=document.createDocumentFragment(); let last=0; const s=node.nodeValue; rx.lastIndex=0; let m;
    while(m=rx.exec(s)){
      if(m.index>last) frag.appendChild(document.createTextNode(s.slice(last,m.index)));
      const sp=document.createElement('span'); sp.className='vocab-hit'; sp.style.background=color;
      sp.dataset.word=m[0]; sp.textContent=m[0]; frag.appendChild(sp);
      last=m.index+m[0].length;
    }
    if(last<s.length) frag.appendChild(document.createTextNode(s.slice(last)));
    node.replaceWith(frag);
  });
}

             data-ph="Gõ hoặc dán lời thoại tiếng Trung ở đây… (bôi đen để định dạng, tự lưu)"></div>

             data-ph="Bản dịch tiếng Việt hoặc giải nghĩa… Paste bản dịch rồi luyện dịch song song."></div>
      </div>
    </div>`;
  setTimeout(()=>{
    const te=$('#transcriptEditor'), tl=$('#translationEditor');
    // nội dung

    te.style.fontSize=(item.tsizePx||21)+'px'; te.style.lineHeight=(item.tlh||2); te.dataset.lh=(item.tlh||2);
    tl.style.fontSize=(item.trSizePx||18)+'px'; tl.style.lineHeight=(item.trLh||1.9); tl.dataset.lh=(item.trLh||1.9);
    applyVocabHighlights(te);
    if(state.settings.pinyin) annotatePinyin(te);
    // lưu transcript
    const onTe=debounce(()=>{ item.transcriptHtml=stripPinyinHTML(stripVocabHighlights(te.innerHTML)); saveMeta(); },350);
    te.addEventListener('input',onTe);
    te.addEventListener('blur',()=>{ item.transcriptHtml=stripPinyinHTML(stripVocabHighlights(te.innerHTML)); applyVocabHighlights(te); saveMeta(); });
    te.addEventListener('click',e=>{ const v=e.target.closest('.vocab-hit'); if(v){ jumpToVocab(v.dataset.word); return; }
      const n=e.target.closest('.note-hit'); if(n){ openNote(n.dataset.noteid); } });
    enableSelectionPopup(te);
    // lưu translation
    const onTl=debounce(()=>{ item.translationHtml=stripVocabHighlights(tl.innerHTML); saveMeta(); },350);
    tl.addEventListener('input',onTl);
    tl.addEventListener('blur',()=>{ item.translationHtml=stripVocabHighlights(tl.innerHTML); applyVocabHighlights(tl); saveMeta(); });
    enableSelectionPopup(tl);
    // toggles
    let tHid=true,tlHid=true;
    function syncToggleBtns(){
      const allOn=!tHid&&!tlHid;
      $('#tgAll').classList.toggle('on',allOn);
      $('#tgAll').textContent=allOn?'🙈 Ẩn tất cả':'👁 Hiện tất cả';
      $('#tgTrans').classList.toggle('on',!tHid);
      $('#tgTrans').textContent=tHid?'📜 Transcript':'📜 Ẩn';
      $('#tgTransl').classList.toggle('on',!tlHid);
      $('#tgTransl').textContent=tlHid?'🌐 Bản dịch':'🌐 Ẩn';
    }
    $('#tgAll').onclick=()=>{
      if(tHid||tlHid){tHid=false;tlHid=false;te.classList.remove('collapsed');tl.classList.remove('collapsed');}
      else{tHid=true;tlHid=true;te.classList.add('collapsed');tl.classList.add('collapsed');}
      syncToggleBtns();
    };
    $('#tgTrans').onclick=()=>{ tHid=!tHid; te.classList.toggle('collapsed',tHid); syncToggleBtns(); };
    $('#tgTransl').onclick=()=>{ tlHid=!tlHid; tl.classList.toggle('collapsed',tlHid); syncToggleBtns(); };
  },0);
  return c;
}

function questionsCard(item){
  const c=document.createElement('div'); c.className='card';
  c.innerHTML=`<div class="card-head"><h3>❓ Câu hỏi trắc nghiệm</h3>
    <div class="mode-tabs">
      <button class="pill on" data-mode="study">📖 Học</button>
      <button class="pill" data-mode="test">✍️ Làm bài</button>
    </div>
    <button class="pill" id="tgAns">Hiện đáp án</button>
    <button class="pill" id="addQ">＋ Câu</button>
  </div>
  <div id="qList"></div>
  <div id="qResult" class="muted" style="margin-top:8px"></div>`;
  setTimeout(()=>{
    let mode='study', showAns=false;
    const answers={}; // câu -> chỉ số chọn (chế độ làm bài)
    const render=()=>{
      const list=$('#qList'); list.innerHTML='';
      if(!item.questions.length){ list.innerHTML='<div class="muted">Chưa có câu hỏi. Bấm <b>＋ Câu</b> để thêm (bài chỉ nghe có thể bỏ trống).</div>'; }
      item.questions.forEach((q,qi)=>list.appendChild(qEl(q,qi)));
    };
    const qEl=(q,qi)=>{
      const el=document.createElement('div'); el.className='q';
      el.innerHTML=`<div><span class="qnum">${esc(q.num||(qi+1))}.</span><span class="qtext">${esc(q.text)}</span>
        <button class="minibtn" style="float:right" data-edit>✏️</button></div>
        <div class="opts"></div>`;
      const opts=el.querySelector('.opts');
      q.options.forEach((o,oi)=>{
        const op=document.createElement('div'); op.className='opt'; op.dataset.oi=oi;
        op.innerHTML=`<span class="lab">${'ABCD'[oi]}</span><span>${esc(o)}</span>`;
        if(mode==='test'){
          if(answers[q.id]===oi) op.classList.add('sel');
          if(showAns){ if(oi===q.correct)op.classList.add('correct'); else if(answers[q.id]===oi)op.classList.add('wrong'); }
          op.onclick=()=>{ if(showAns)return; answers[q.id]=oi; render(); };
        }else{ // chế độ học: luôn cho thấy đáp án đúng nếu bật
          if(showAns && oi===q.correct) op.classList.add('correct');
        }
        opts.appendChild(op);
      });
      if(showAns && q.explain){ const ex=document.createElement('div'); ex.className='explain';
        ex.innerHTML='<b>Giải thích:</b> '+(q.explain||''); el.appendChild(ex); }
      el.querySelector('[data-edit]').onclick=()=>editQ(q,qi);
      enableSelectionPopup(el);
      return el;
    };
    const editQ=(q,qi)=>{
      const el=$('#qList').children[qi];
      el.classList.add('q-edit');
      el.innerHTML=`
        <div class="row-inline"><span class="muted">Số câu:</span>
          <input type="text" id="eqNum" value="${esc(q.num||'')}" style="width:70px" placeholder="vd 1"/></div>
        <input type="text" id="eqText" value="${esc(q.text)}" placeholder="Nội dung câu hỏi (tiếng Trung)"/>
        ${q.options.map((o,oi)=>`<div class="opt-edit">
          <input type="radio" name="cor" ${q.correct===oi?'checked':''} value="${oi}"/>
          <span class="lab" style="font-weight:700">${'ABCD'[oi]}</span>
          <input type="text" class="eqOpt" value="${esc(o)}"/></div>`).join('')}
        <label class="muted" style="font-weight:600;display:block;margin-top:6px">Giải thích (không bắt buộc — bôi đen để định dạng)</label>
        <div class="editor latin fmt" id="eqExp" contenteditable="true" style="font-size:14px;min-height:40px">${q.explain||''}</div>
        <div class="modal-actions">
          <button class="minibtn danger" id="eqDel">🗑 Xoá câu</button>
          <button class="minibtn" id="eqCancel">Huỷ</button>
          <button class="minibtn primary" id="eqSave">Lưu câu</button>
        </div>`;
      $('#eqSave').onclick=()=>{
        q.num=$('#eqNum').value.trim(); q.text=$('#eqText').value.trim();
        q.options=$$('.eqOpt',el).map(i=>i.value);
        const cr=el.querySelector('input[name=cor]:checked'); q.correct=cr?parseInt(cr.value):0;
        q.explain=$('#eqExp').innerHTML.trim();
        saveMeta(); render();
      };
      $('#eqCancel').onclick=render;
      $('#eqDel').onclick=()=>{ item.questions.splice(qi,1); saveMeta(); render(); };
    };
    $('#addQ').onclick=()=>{ item.questions.push({id:uid(),num:String(item.questions.length+1),
      text:'',options:['','','',''],correct:0,explain:''}); saveMeta(); render(); editQ(item.questions[item.questions.length-1],item.questions.length-1); };
    $('#tgAns').onclick=()=>{ showAns=!showAns; $('#tgAns').classList.toggle('on',showAns);
      $('#tgAns').textContent=showAns?'Ẩn đáp án':'Hiện đáp án';
      if(mode==='test'&&showAns){ // chấm điểm
        let ok=0; item.questions.forEach(q=>{ if(answers[q.id]===q.correct)ok++; });
        $('#qResult').textContent=`Kết quả: ${ok}/${item.questions.length} câu đúng.`;
      }else $('#qResult').textContent='';
      render(); };
    $$('[data-mode]',c).forEach(b=>b.onclick=()=>{ $$('[data-mode]',c).forEach(x=>x.classList.remove('on'));
      b.classList.add('on'); mode=b.dataset.mode; showAns=false; $('#tgAns').classList.remove('on');
      $('#tgAns').textContent='Hiện đáp án'; $('#qResult').textContent=''; render(); });
    render();
  },0);
  return c;
}

/* ---------- (d) ÔN TẬP ---------- */
function reviewCard(item){
  const MILES=[1,3,7,14,21,30,60,80,180];
  const c=document.createElement('div'); c.className='card';
  c.innerHTML=`<div class="card-head"><h3>🔁 Số lần ôn (lặp ngắt quãng)</h3></div>
    <div class="review-dots" id="dots"></div>
    <textarea id="revNote" class="vocab-search" style="margin-top:14px;min-height:60px;font-family:var(--latin)"
      placeholder="Ghi chú cho các lần ôn về sau…">${esc(item.reviews.note||'')}</textarea>`;
  setTimeout(()=>{
    const dots=$('#dots');
    MILES.forEach(m=>{
      const done=!!item.reviews.marks[m];
      const d=document.createElement('div'); d.className='dot'+(done?' done':'');
      d.innerHTML=`<div class="ball">${m}</div>
        <input type="date" class="dt" value="${item.reviews.marks[m]||''}" style="${done?'':'visibility:hidden'}"/>`;
      const ball=d.querySelector('.ball'); const dt=d.querySelector('.dt');
      // bấm vòng tròn: bật/tắt mốc. Khi bật, mặc định hôm nay nhưng có thể đổi bằng ô ngày.
      ball.onclick=()=>{ if(item.reviews.marks[m]){ delete item.reviews.marks[m]; d.classList.remove('done');
          dt.value=''; dt.style.visibility='hidden'; }
        else { item.reviews.marks[m]=todayStr(); d.classList.add('done');
          dt.value=item.reviews.marks[m]; dt.style.visibility='visible'; dt.focus(); dt.showPicker&&dt.showPicker(); }
        saveMeta(); renderTree(); };
      // tự chọn ngày
      dt.onchange=()=>{ if(dt.value){ item.reviews.marks[m]=dt.value; d.classList.add('done'); }
        else { delete item.reviews.marks[m]; d.classList.remove('done'); dt.style.visibility='hidden'; } saveMeta(); };
      dots.appendChild(d);
    });
    $('#revNote').addEventListener('input',debounce(e=>{ item.reviews.note=e.target.value; saveMeta(); },300));
  },0);
  return c;
}

/* ============================================================
   ✂️ POPUP CHỌN VĂN BẢN  (Lưu thẻ / Ghi chú / Highlight)
   ============================================================ */
let lastSelText='', lastSelRange=null, lastSelEditor=null;
function enableSelectionPopup(el){
  el.addEventListener('mouseup',e=>showSelPop(e,el));
  el.addEventListener('contextmenu',e=>{ const s=window.getSelection(); if(s&&s.toString().trim()){ e.preventDefault(); showSelPop(e,el);} });
}
function showSelPop(e,el){
  const sel=window.getSelection(); const txt=sel?sel.toString().trim():'';
  const pop=$('#selpop');
  if(!txt){ pop.classList.remove('show'); return; }
  lastSelText=txt; lastSelEditor=el;
  try{ lastSelRange=sel.getRangeAt(0).cloneRange(); }catch(_){ lastSelRange=null; }
  const isEditable = el.isContentEditable;
  const canNote = el.id==='transcriptEditor' || el.id==='translationEditor';
  pop.innerHTML=`
    <button data-a="vocab">🔖 Lưu thẻ</button>
    ${canNote?`<button data-a="note">📝 Ghi chú</button>`:''}
    ${isEditable?`<button data-a="hl">🖊 Highlight</button>`:''}`;
  pop.style.left=(Math.min(e.pageX, window.scrollX+window.innerWidth-180))+'px';
  pop.style.top =(e.pageY-46)+'px';
  pop.classList.add('show');
  pop.querySelector('[data-a="vocab"]').onclick=()=>{ pop.classList.remove('show'); openVocabForm({word:txt}); };
  const nb=pop.querySelector('[data-a="note"]');
  if(nb) nb.onclick=()=>{ pop.classList.remove('show'); addNoteFromSelection(); };
  const hl=pop.querySelector('[data-a="hl"]');
  if(hl) hl.onclick=()=>{ pop.classList.remove('show'); restoreSel(); el.focus();
    document.execCommand('styleWithCSS',false,true);
    document.execCommand('hiliteColor',false,(state.settings.hlColor||'').startsWith('var')?'#FFF1A8':state.settings.hlColor);
    fireInput(el); };
}
function restoreSel(){ if(!lastSelRange)return; const s=window.getSelection(); s.removeAllRanges(); s.addRange(lastSelRange); }
// bọc vùng chọn vào 1 thẻ span (chịu được khi vùng chọn trải nhiều dòng)
function wrapSelection(range,className,data){
  const span=document.createElement('span'); span.className=className;
  Object.entries(data||{}).forEach(([k,v])=>span.dataset[k]=v);
  try{ range.surroundContents(span); }
  catch(_){ const frag=range.extractContents(); span.appendChild(frag); range.insertNode(span); }
  return span;
}
document.addEventListener('mousedown',e=>{ if(!e.target.closest('#selpop')) $('#selpop').classList.remove('show'); });

function addNoteFromSelection(){
  const item=findItem(currentItemId); if(!item || !lastSelRange || !lastSelEditor)return;
  const id='note_'+uid();
  const span=wrapSelection(lastSelRange,'note-hit',{noteid:id});
  const ed=span.closest('.editor'); if(ed) saveEditor(ed);
  item.notes.push({id, excerpt:lastSelText, bodyHtml:''}); saveMeta();
  openDrawer('right'); switchRTab('notes'); renderNotes(); openNote(id);
  toast('Đã thêm ghi chú.');
}

/* ============================================================
   🔖 THẺ TỪ VỰNG  (CRUD + form có định dạng)
   ============================================================ */
const VFIELDS=[
  ['word','① Từ (chữ Hán) *','han'],
  ['pinyin','② Pinyin',''],
  ['pos','③ Từ loại',''],
  ['hanThink','④ Tư duy chữ Hán','area'],
  ['vi','⑤ Nghĩa tiếng Việt','area'],
  ['zh','⑥ Nghĩa tiếng Trung','area'],
  ['struct','⑦ Cấu trúc cố định','area'],
  ['usage','⑧ Cách dùng & ví dụ','area'],
  ['distinguish','⑨ Phân biệt','area'],
  ['minitest','⑩ Mini test','area'],
];
let editingVocabId=null;

function renderVocab(filter=''){
  const list=$('#vocabList'); list.innerHTML='';
  const f=filter.trim().toLowerCase();
  const arr=state.vocab.filter(v=>!f || (v.word||'').toLowerCase().includes(f)
    || (v.pinyin||'').toLowerCase().includes(f) || (v.vi||'').toLowerCase().includes(f));
  if(!arr.length){ list.innerHTML='<div class="muted" style="padding:10px">Chưa có thẻ. Bôi đen từ trong transcript → 🔖, hoặc bấm “＋ Thêm thẻ”.</div>'; return; }
  arr.forEach(v=>list.appendChild(vcardEl(v)));
}
function vcardEl(v){
  const el=document.createElement('div'); el.className='vcard'; el.dataset.id=v.id;
  el.innerHTML=`<div class="vcard-head">
      <span class="w">${esc(v.word)}</span>
      <span class="py">${esc(v.pinyin||'')}</span>
      <button class="iconbtn x" style="width:28px;height:28px;font-size:12px" title="Sửa">✏️</button>
      <button class="iconbtn x" style="width:28px;height:28px;font-size:12px" title="Xoá">🗑</button>
    </div>
    <div class="vcard-body">
      ${VFIELDS.slice(1).map(([k,label])=> v[k]?`<div class="vfield"><label>${label.replace(/^[①-⑩]\s/,'')}</label><div class="val">${v[k]}</div></div>`:'').join('')}
    </div>`;
  const head=el.querySelector('.vcard-head');
  head.onclick=e=>{ if(e.target.closest('.iconbtn'))return; el.classList.toggle('open'); };
  const [editBtn,delBtn]=el.querySelectorAll('.iconbtn');
  editBtn.onclick=e=>{e.stopPropagation(); openVocabForm(v);};
  delBtn.onclick=e=>{e.stopPropagation(); if(confirm('Xoá thẻ “'+v.word+'” ?')){
    state.vocab=state.vocab.filter(x=>x.id!==v.id); saveMeta(); renderVocab($('#vocabSearch').value);
    applyVocabHighlights($('#transcriptEditor')); applyVocabHighlights($('#translationEditor')); }};
  return el;
}

// form thêm/sửa thẻ — ô gõ là contentEditable .fmt (dùng thanh định dạng chung)
function openVocabForm(seed={}){
  openDrawer('right'); switchRTab('vocab');
  editingVocabId = seed.id || null;
  const form=$('#vocabForm');
  form.innerHTML=`<div class="vform card" style="margin:8px 0">
    <div class="card-head"><h3 style="font-size:14px">${seed.id?'✏️ Sửa thẻ':'🔖 Thẻ mới'}</h3>
      <button class="iconbtn" id="vfClose" style="width:28px;height:28px;font-size:12px">✕</button></div>
    ${VFIELDS.map(([k,label,t])=>{
      if(k==='word') return `<label class="muted" style="font-weight:600">${label}</label>
        <input id="vf_${k}" class="han-in" value="${esc(seed.word||'')}"/>`;
      if(t==='') return `<label class="muted" style="font-weight:600">${label}</label>
        <input id="vf_${k}" value="${esc(seed[k]||'')}"/>`;
      return `<label class="muted" style="font-weight:600">${label}</label>
        <div class="editor latin fmt" id="vf_${k}" contenteditable="true" style="font-size:14px;min-height:34px">${seed[k]||''}</div>`;
    }).join('')}
    <div class="modal-actions"><button class="minibtn primary" id="vfSave">💾 Lưu thẻ</button></div>
    <div class="hint">Bôi đen chữ trong ô để in đậm/nghiêng/bullet… (dùng thanh nổi phía trên). Từ ở ô ① sẽ tự highlight trong transcript.</div>
  </div>`;
  $('#vfClose').onclick=()=>{ form.innerHTML=''; editingVocabId=null; };
  $('#vfSave').onclick=()=>{
    const getVal=(k,t)=> t==='' || k==='word' ? $('#vf_'+k).value.trim() : $('#vf_'+k).innerHTML;
    const word=$('#vf_word').value.trim();
    if(!word){ toast('Cần nhập “Từ” (ô ①).'); return; }
    let rec = editingVocabId ? state.vocab.find(x=>x.id===editingVocabId) : null;
    if(!rec){ rec={id:uid()}; state.vocab.push(rec); }
    VFIELDS.forEach(([k,label,t])=> rec[k]=getVal(k,t));
    rec.itemId=currentItemId;
    saveMeta(); form.innerHTML=''; editingVocabId=null;

function jumpToVocab(word){
  openDrawer('right'); switchRTab('vocab');
  const v=state.vocab.find(x=>x.word===word); if(!v)return;
  renderVocab();
  setTimeout(()=>{ const el=$(`.vcard[data-id="${v.id}"]`); if(el){ el.classList.add('open','flash');
    el.scrollIntoView({behavior:'smooth',block:'center'}); setTimeout(()=>el.classList.remove('flash'),1200);} },60);
}

/* ============================================================
   📝 GHI CHÚ (hiển thị ở ngăn phải, dạng thẻ pop-up)
   ============================================================ */
function switchRTab(tab){
  $$('.rtabs .pill').forEach(b=>b.classList.toggle('on',b.dataset.rtab===tab));
  $('#vocabPane').style.display = tab==='vocab'?'block':'none';
  $('#notesPane').style.display = tab==='notes'?'block':'none';
}
function renderNotes(){
  const item=findItem(currentItemId); const list=$('#notesList'); if(!list)return; list.innerHTML='';
  if(!item || !item.notes.length){ list.innerHTML='<div class="muted" style="padding:6px">Chưa có ghi chú nào cho bài này.</div>'; return; }
  item.notes.forEach(nt=>{
    const el=document.createElement('div'); el.className='ncard'; el.dataset.id=nt.id;
    el.innerHTML=`<div class="nhead"><div class="ex">“${esc(nt.excerpt||'')}”</div>
        <button class="x" title="Xoá ghi chú">🗑</button></div>
      <div class="nbody"><div class="editor latin fmt" contenteditable="true"
        data-ph="Viết ghi chú cho câu này… (bôi đen để định dạng)">${nt.bodyHtml||''}</div></div>`;
    const body=el.querySelector('.editor');
    body.addEventListener('input',debounce(()=>{ nt.bodyHtml=body.innerHTML; saveMeta(); },300));
    el.querySelector('.x').onclick=()=>deleteNote(nt.id);
    list.appendChild(el);
  });
}
function openNote(id){
  openDrawer('right'); switchRTab('notes'); renderNotes();
  setTimeout(()=>{ const el=$(`.ncard[data-id="${id}"]`); if(el){ el.classList.add('flash');
    el.scrollIntoView({behavior:'smooth',block:'center'});
    const b=el.querySelector('.editor'); if(b) b.focus();
    setTimeout(()=>el.classList.remove('flash'),1200);} },60);
}
function deleteNote(id){
  const item=findItem(currentItemId); if(!item)return;
  if(!confirm('Xoá ghi chú này?'))return;
  item.notes=item.notes.filter(n=>n.id!==id);
  // gỡ highlight note-hit trong transcript & bản dịch
  ['#transcriptEditor','#translationEditor'].forEach(sel=>{ const ed=$(sel); if(!ed)return;
    const sp=ed.querySelector(`.note-hit[data-noteid="${id}"]`);
    if(sp){ const t=document.createTextNode(sp.textContent); sp.replaceWith(t); ed.normalize(); saveEditor(ed); } });
  saveMeta(); renderNotes();
}

/* ============================================================
   🔍 TÌM KIẾM XUYÊN THƯ VIỆN
   ============================================================ */
function htmlToText(h){ const d=document.createElement('div'); d.innerHTML=h||''; return d.textContent||''; }
const doSearch=debounce(q=>{
  const box=$('#searchResults'); q=q.trim().toLowerCase();
  if(!q){ box.classList.remove('open'); return; }
  const res=[];
  walk(state.roots,(n,parent)=>{
    if(n.type==='folder'){ if((n.name||'').toLowerCase().includes(q)) res.push({type:'Thư mục',id:n.id,label:n.name,path:pathOf(n.id).slice(0,-1).join(' › ')}); }
    else{
      const inTitle=(n.title||'').toLowerCase().includes(q);
      const inTrans=htmlToText(n.transcriptHtml).toLowerCase().includes(q)||htmlToText(n.translationHtml).toLowerCase().includes(q);
      const inQ=(n.questions||[]).some(x=>(x.text||'').toLowerCase().includes(q)||x.options.some(o=>(o||'').toLowerCase().includes(q)));
      if(inTitle||inTrans||inQ) res.push({type:'Bài',id:n.id,label:n.title,path:pathOf(n.id).slice(0,-1).join(' › '),
        sub: inTitle?'':(inTrans?'khớp transcript':'khớp câu hỏi')});
    }
  });
  state.vocab.forEach(v=>{ if((v.word||'').toLowerCase().includes(q)||(v.pinyin||'').toLowerCase().includes(q)||htmlToText(v.vi).toLowerCase().includes(q))
    res.push({type:'Từ vựng',vocab:true,id:v.id,label:v.word+(v.pinyin?'  '+v.pinyin:''),path:htmlToText(v.vi).slice(0,40)}); });

  box.innerHTML = res.length ? res.map(r=>`<div class="sr-item" data-id="${r.id}" data-v="${r.vocab?1:0}">
      <span class="tag ${r.vocab?'v':''}">${r.type}</span>${esc(r.label)}
      <div class="path">${esc(r.path||'')}${r.sub?' · '+r.sub:''}</div></div>`).join('')
    : '<div class="sr-empty">Không tìm thấy.</div>';
  box.classList.add('open');
  $$('.sr-item',box).forEach(it=>it.onclick=()=>{
    box.classList.remove('open'); $('#search').value='';
    if(it.dataset.v==='1'){ const v=state.vocab.find(x=>x.id===it.dataset.id);
      if(v.itemId&&findItem(v.itemId)) openItem(v.itemId); jumpToVocab(v.word); }
    else{ const r=findNode(it.dataset.id); if(r.node.type==='item') openItem(r.node.id);
      else { expanded.add(r.node.id); openDrawer('left'); renderTree(); } }
  });
},180);

    </div>`);

}

function openMoveDialog(node){
  let picked=null;
  const pick=(nodes,depth=0)=> nodes.filter(n=>n.type==='folder').map(n=>{
    const disabled=isDescendant(node.id,n.id)||n.id===node.id;
    return `<div class="pk" data-id="${n.id}" style="padding-left:${8+depth*16}px;${disabled?'opacity:.35;pointer-events:none':''}">📁 ${esc(n.name)}</div>`
      + (n.children?pick(n.children,depth+1):'');
  }).join('');
  openModal(`<h3>↕ Di chuyển “${esc(node.name||node.title)}”</h3>
    <div class="hint" style="margin-bottom:8px">Chọn thư mục đích, hoặc kéo-thả trực tiếp trong cây thư viện.</div>
    <div class="tree-pick" id="movePick">
      <div class="pk" data-id="__root__">🏠 Mức gốc (ngoài cùng)</div>
      ${pick(state.roots)}
    </div>
    <div class="modal-actions"><button class="minibtn" id="mvCancel">Huỷ</button>
      <button class="minibtn primary" id="mvOk">Di chuyển</button></div>`);
  $$('#movePick .pk').forEach(p=>p.onclick=()=>{ $$('#movePick .pk').forEach(x=>x.classList.remove('sel'));
    p.classList.add('sel'); picked=p.dataset.id; });
  $('#mvCancel').onclick=closeModal;
  $('#mvOk').onclick=()=>{ if(!picked){toast('Chọn thư mục đích.');return;}
    const n=removeNode(node.id);
    if(picked==='__root__') state.roots.push(n);
    else { const t=findNode(picked); t.node.children.push(n); expanded.add(picked); }
    renderTree(); saveMeta(); closeModal(); toast('Đã di chuyển.'); };
}

    </div>
    <div class="modal-actions"><button class="minibtn primary" id="setClose">Xong</button></div>`);
  $$('.setHL').forEach(s=>s.onclick=()=>{ state.settings.hlColor=s.dataset.c; saveMeta(); toast('Đã đổi màu highlight.'); });

function exportJSON(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='tinh-nghe-backup-'+todayStr()+'.json'; a.click(); URL.revokeObjectURL(a.href);
  toast('Đã xuất file JSON.');
}
function importJSON(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader(); r.onload=()=>{ try{ const data=JSON.parse(r.result);
    if(!data.roots) throw 0; state=data; if(!state.vocab)state.vocab=[];
    if(!state.settings)state.settings={hlColor:'var(--hl-yellow)',vocabColor:'#FFF1A8'};
    currentItemId=null; renderTree(); renderVocab(); renderMain(); saveMeta(); closeModal(); toast('Đã nhập dữ liệu.');
  }catch(_){ toast('File JSON không hợp lệ.'); } };
  r.readAsText(f);
}
async function connectFile(){
  if(!FSA){ toast('Không hỗ trợ trên trình duyệt này.'); return; }
  try{
    fileHandle = await window.showSaveFilePicker({suggestedName:'tinh-nghe.json',
      types:[{description:'JSON',accept:{'application/json':['.json']}}]});
    await idbSet('meta','fileHandle',fileHandle);
    await writeHandle(); toast('Đã kết nối file. Sẽ tự ghi khi bạn sửa.'); closeModal();
  }catch(err){ if(err&&err.name!=='AbortError') toast('Không kết nối được file.'); }
}
async function writeHandle(){
  try{
    if(!fileHandle) return;
    if(fileHandle.queryPermission){ const p=await fileHandle.queryPermission({mode:'readwrite'});
      if(p!=='granted'){ const r=await fileHandle.requestPermission({mode:'readwrite'}); if(r!=='granted')return; } }
    const w=await fileHandle.createWritable(); await w.write(JSON.stringify(state,null,2)); await w.close();
  }catch(e){ console.warn('writeHandle lỗi',e); }
}
